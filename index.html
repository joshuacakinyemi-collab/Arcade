<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Arcade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>

<body>

  <main>
    <div class="aero-window">

      <div class="aero-title-bar">
        <span class="aero-title-icon"></span>
        <span class="aero-title-bar-text">Digital Arcade</span>
        <div class="aero-title-bar-controls">
          <button aria-label="Minimize">&#8212;</button>
          <button aria-label="Maximize">&#9633;</button>
          <button aria-label="Close" class="close">&#215;</button>
        </div>
      </div>

      <div class="aero-window-menubar">
        <span class="menu-title">[ PLEASE INSERT A DISC ]</span>
      </div>

      <div class="aero-window-body">
        <div class="wiiu-layout">

          <div class="tile">
            <a href="pac-man/index.html" class="tile-link">
              <div class="tile-icon">
                <img src="pictures/pac-man.png" alt="Pac-Man">
              </div>
              <span class="tile-label">PAC-MAN</span>
            </a>
          </div>

          <div class="tile tile--empty">
            <div class="tile-icon"></div>
            <span class="tile-label">COMING SOON</span>
          </div>
          <div class="tile tile--empty">
            <div class="tile-icon"></div>
            <span class="tile-label">COMING SOON</span>
          </div>
          <div class="tile tile--empty">
            <div class="tile-icon"></div>
            <span class="tile-label">COMING SOON</span>
          </div>

        </div>
      </div>

      <div class="aero-window-footer">
        <span>© 2026 Joshua Caleb Akinyemi // ALL SYSTEMS OPERATIONAL</span>
      </div>

    </div>
  </main>

</body>

</html>
